name: Build and Deploy QaOps

on:
  push:
    branches: [ "main"]

env:
    RELEASE_NAME: QaOps
    
jobs:
   Docker_Build:
     name: Build and Publish
     runs-on: ubuntu-latest
     environment: 
       name: ${{ github.ref_name == 'main' && 'main'  }}

     permissions:
       contents: "read"
       id-token: "write"

     steps:
       - name: Checkout
         uses: actions/checkout@v4
       
       - name: print secrets
         run: |
           echo "DEVOPS_WORKLOAD_IDENTITY_PROVIDER_ID: ${{ secrets.DEVOPS_WORKLOAD_IDENTITY_PROVIDER_ID }}
           echo "DEVOPS_SERVICE_ACCOUNT: ${{ secrets.DEVOPS_SERVICE_ACCOUNT }}

       - id: "auth"
         name: "Authenticate to Google Cloud"
         uses: "google-github-actions/auth@v2"
         with:
           token_format: "access_token"
           workload_identity_provider: ${{ secrets.DEVOPS_WORKLOAD_IDENTITY_PROVIDER_ID }}
           service_account: ${{ secrets.DEVOPS_SERVICE_ACCOUNT }}
           
       - name: Docker configuration
         run: |-
           echo ${{steps.auth.outputs.access_token}} | docker login -u oauth2accesstoken --password-stdin https://${{ vars.ARTIFACT_REGION }}-docker.pkg.dev
           
       - name: Build
         run: |-
           docker build \
             -t "${{ vars.ARTIFACT_REGION }}-docker.pkg.dev/${{ vars.ARTIFACT_PROJECT}}/${{ vars.ARTIFACT_REPOSITORY}}/${{ github.ref_name }}:${{ github.run_number }}" .

       - name: Publish
         run: |-
           docker push "${{ vars.ARTIFACT_REGION }}-docker.pkg.dev/${{ vars.ARTIFACT_PROJECT}}/${{ vars.ARTIFACT_REPOSITORY }}/${{ github.ref_name }}:${{ github.run_number }}"